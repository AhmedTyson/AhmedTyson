<svg fill="none" width="900" height="350" viewBox="0 0 900 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="350" rx="10" fill="#0d1117" />
  
  <style>
    .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 18px; fill: #8A2BE2; font-weight: bold; text-anchor: middle; }
    .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 14px; fill: #8b949e; text-anchor: middle; }
    .icon { stroke: #8A2BE2; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Item 1: Backend Architect -->
  <g transform="translate(150, 80)">
    <g transform="translate(-12, -40)">
      <rect width="18" height="18" x="3" y="3" rx="2" class="icon"/>
      <path d="M3 9h18M9 21V9" class="icon"/>
    </g>
    <text y="5" class="title">Backend Architect</text>
    <text y="30" class="subtitle">RESTful APIs · Clean Architecture</text>
    <text y="50" class="subtitle">Scalable systems</text>
  </g>

  <!-- Item 2: Security Engineering -->
  <g transform="translate(450, 80)">
    <g transform="translate(-12, -40)">
      <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1-1z" class="icon"/>
      <path d="m9 12l2 2l4-4" class="icon"/>
    </g>
    <text y="5" class="title">Security Engineering</text>
    <text y="30" class="subtitle">RBAC systems · Parameterized queries</text>
    <text y="50" class="subtitle">Layered architecture</text>
  </g>

  <!-- Item 3: Data Maestro -->
  <g transform="translate(750, 80)">
    <g transform="translate(-12, -40)">
      <ellipse cx="12" cy="5" rx="9" ry="3" class="icon"/>
      <path d="M3 5v14a9 3 0 0 0 18 0V5" class="icon"/>
      <path d="M3 12a9 3 0 0 0 18 0" class="icon"/>
    </g>
