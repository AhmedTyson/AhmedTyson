    <text y="30" class="subtitle">High-performance schemas</text>
    <text y="50" class="subtitle">Clear ERDs · T-SQL optimization</text>
  </g>

  <!-- Item 4: Clean Architecture -->
  <g transform="translate(150, 240)">
    <g transform="translate(-12, -40)">
      <path d="M21.3 15.3a2.4 2.4 0 0 1 0 3.4l-2.6 2.6a2.4 2.4 0 0 1-3.4 0L2.7 8.7a2.41 2.41 0 0 1 0-3.4l2.6-2.6a2.41 2.41 0 0 1 3.4 0Zm-6.8-2.8l2-2m-5-1l2-2m-5-1l2-2m7 11l2-2" class="icon"/>
    </g>
    <text y="5" class="title">Clean Architecture</text>
    <text y="30" class="subtitle">Clean code · SOLID principles</text>
    <text y="50" class="subtitle">Comprehensive documentation</text>
  </g>

  <!-- Item 5: Backend Ecosystem -->
  <g transform="translate(450, 240)">
    <g transform="translate(-12, -40)">
      <circle cx="12" cy="12" r="10" class="icon"/>
      <path d="m16.24 7.76l-1.804 5.411a2 2 0 0 1-1.265 1.265L7.76 16.24l1.804-5.411a2 2 0 0 1 1.265-1.265z" class="icon"/>
    </g>
